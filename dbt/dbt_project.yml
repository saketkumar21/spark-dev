name: spark_dev
version: "1.0.0"
config-version: 2

profile: spark_dev

model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]
macro-paths: ["macros"]
target-path: "target"
clean-targets: ["target", "dbt_packages"]

seeds:
  spark_dev:
    +schema: seeds
    +full_refresh: true
    +pre-hook:
      - "DROP TABLE IF EXISTS {{ this }};"
    +file_format: iceberg

models:
  spark_dev:
    # dbt-spark-transpile: global default — treat model SQL as Snowflake and
    # transpile to Spark at compile time. Override per model with
    # {{ config(transpile_from='snowflake'|'spark'|…) }}. No-op when the source
    # dialect equals the target (spark) or (guarded mode) no QUALIFY token is present.
    +transpile_from: snowflake
    +transpile_to: spark
    # +file_format: iceberg
    +materialized: table
    staging:
      +materialized: view
      +schema: staging
    marts:
      +schema: marts
