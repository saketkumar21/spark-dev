version: 2
sources:
  - name: raw_landing
    schema: seeds
    description: "Raw landed tables (the seeded orders) — used to demo source freshness SLAs."
    tables:
      - name: orders
        description: "Landed orders; loaded_at is the landing timestamp freshness is measured on."
        loaded_at_field: loaded_at
        freshness:
          warn_after: {count: 12, period: hour}
          error_after: {count: 24, period: hour}
