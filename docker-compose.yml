# =============================================================================
# spark-dev Docker Compose
# =============================================================================
#
# Services:
#   spark-connect  — Spark Unified Server (Thrift :10000, gRPC :15002, UI :4040)
#   spark-history  — Spark History Server (:18080)
#   kafka          — Kafka broker (KRaft, :29092 external)
#   kafka-ui       — Kafka topic browser (:8080)
#
# JupyterLab runs locally on the host:  make jupyter
#
# Resource profile (laptop safety): the spark-connect container is memory-capped
# via SPARK_MEM_LIMIT and its driver heap via SPARK_DRIVER_MEMORY. The profile values
# live in conf/profiles/{tuned,constrained}.env (single source of truth) and are
# selected via compose `--env-file`. Flip profiles with:
#   make up              → tuned       (conf/profiles/tuned.env)
#   make up-constrained  → constrained (conf/profiles/constrained.env) for OOM/spill modules
# The ${VAR:-default} fallbacks below are the defensive default for a bare
# `docker compose up` with no profile selected.
# Approx footprint of the rest: kafka ~1.2 GB, kafka-ui ~0.6 GB, history ~0.4 GB.
# On an 8 GB laptop you can stop optional services (history, kafka-ui) while running
# the heavier tracks. All generated data stays in .tmp/ (make clean recovers).
# =============================================================================

services:

  # ── Spark Unified Server (Thrift + Connect in same JVM) ───────────────────
  spark-connect:
    build: .
    image: spark-dev:latest
    container_name: spark-connect
    mem_limit: ${SPARK_MEM_LIMIT:-3g}
    ports:
      - "${SPARK_CONNECT_PORT:-15002}:15002"
      - "${SPARK_THRIFT_PORT:-10000}:10000"
      - "${SPARK_UI_PORT:-4040}:4040"
    volumes:
      - .:/app
      - ivy-cache:/root/.ivy2
    environment:
      - SPARK_CONF_DIR=/app/conf
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      # Resource profile — flipped by `make up` vs `make up-constrained`.
      - SPARK_DRIVER_MEMORY=${SPARK_DRIVER_MEMORY:-2g}
      - SPARK_CORES=${SPARK_CORES:-*}
    command: ["connect"]
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 15002 && nc -z localhost 10000 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s
    restart: unless-stopped

  # ── Spark History Server ──────────────────────────────────────────────────
  spark-history:
    image: spark-dev:latest
    container_name: spark-history
    ports:
      - "${SPARK_HISTORY_PORT:-18080}:18080"
    volumes:
      - .:/app
    environment:
      - SPARK_CONF_DIR=/app/conf
    command: ["history"]
    restart: unless-stopped

  # ── Kafka (KRaft — no ZooKeeper) ──────────────────────────────────────────
  kafka:
    image: apache/kafka:latest
    container_name: kafka
    ports:
      - "${KAFKA_EXTERNAL_PORT:-29092}:29092"
    environment:
      - KAFKA_NODE_ID=0
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:29092
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      # Single-broker dev cluster: the transaction-state log defaults to RF=3 / min-ISR=2,
      # which a lone broker can't satisfy — so any idempotent/transactional producer
      # (`enable.idempotence=true`, used by KAF-5 delivery-semantics) hangs forever on
      # initProducerId. Pin both to 1 so EOS producers work locally.
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - CLUSTER_ID=spark-dev-kafka-cluster-01
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ── Kafka UI ──────────────────────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "${KAFKA_UI_PORT:-8080}:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  # ── Postgres (CDC source) ─────────────────────────────────────────────────
  # Opt-in: only starts with `make cdc-up` (compose profile "cdc"), NOT `make up`.
  # wal_level=logical + replication slots are what Debezium decodes. Ephemeral
  # (no volume) so a recreate gives a clean source; notebooks seed their own data.
  postgres:
    image: postgres:16
    container_name: postgres
    profiles: ["cdc"]
    mem_limit: ${POSTGRES_MEM_LIMIT:-512m}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-cdc}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-cdc}
      - POSTGRES_DB=${POSTGRES_DB:-inventory}
    # Logical decoding settings Debezium requires (pgoutput plugin is built in to PG 16).
    command:
      - "postgres"
      - "-c"
      - "wal_level=logical"
      - "-c"
      - "max_wal_senders=4"
      - "-c"
      - "max_replication_slots=4"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cdc} -d ${POSTGRES_DB:-inventory}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  # ── Kafka Connect + Debezium Postgres connector ───────────────────────────
  # Opt-in (profile "cdc"). The debezium/connect image ships the Debezium
  # Postgres connector; register it via the REST API on :8083. Internal Connect
  # topics use RF=1 for the single-broker dev cluster.
  kafka-connect:
    image: debezium/connect:3.0.0.Final
    container_name: kafka-connect
    profiles: ["cdc"]
    mem_limit: ${CONNECT_MEM_LIMIT:-1g}
    ports:
      - "${CONNECT_PORT:-8083}:8083"
    environment:
      - BOOTSTRAP_SERVERS=kafka:9092
      - GROUP_ID=spark-dev-connect
      - CONFIG_STORAGE_TOPIC=connect_configs
      - OFFSET_STORAGE_TOPIC=connect_offsets
      - STATUS_STORAGE_TOPIC=connect_statuses
      - CONFIG_STORAGE_REPLICATION_FACTOR=1
      - OFFSET_STORAGE_REPLICATION_FACTOR=1
      - STATUS_STORAGE_REPLICATION_FACTOR=1
      - KEY_CONVERTER=org.apache.kafka.connect.json.JsonConverter
      - VALUE_CONVERTER=org.apache.kafka.connect.json.JsonConverter
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8083/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 40s
    restart: unless-stopped

  # ── Observability (CAP-3) — opt-in metrics stack ──────────────────────────
  # All behind compose profile "monitoring": `make monitoring-up`. NOT started by `make up`.
  # postgres-exporter needs `make cdc-up` (the CDC Postgres) to have a database to read.
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    profiles: ["monitoring"]
    mem_limit: ${PROMETHEUS_MEM_LIMIT:-512m}
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./conf/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    profiles: ["monitoring"]
    mem_limit: ${GRAFANA_MEM_LIMIT:-512m}
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_AUTH_ANONYMOUS_ENABLED=true        # read-only browsing without login (local teaching)
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./conf/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

  # Kafka metrics over the Kafka protocol (no JMX agent) — KAF-1/KAF-2 lag + per-partition offsets.
  kafka-exporter:
    image: danielqsj/kafka-exporter:latest
    container_name: kafka-exporter
    profiles: ["monitoring"]
    mem_limit: ${KAFKA_EXPORTER_MEM_LIMIT:-128m}
    command: ["--kafka.server=kafka:9092"]
    ports:
      - "${KAFKA_EXPORTER_PORT:-9308}:9308"
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  # Postgres metrics — the CDC-5 replication-slot retained-WAL signal. Needs `make cdc-up`.
  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:latest
    container_name: postgres-exporter
    profiles: ["monitoring"]
    mem_limit: ${POSTGRES_EXPORTER_MEM_LIMIT:-128m}
    environment:
      - DATA_SOURCE_NAME=postgresql://${POSTGRES_USER:-cdc}:${POSTGRES_PASSWORD:-cdc}@postgres:5432/${POSTGRES_DB:-inventory}?sslmode=disable
    ports:
      - "${POSTGRES_EXPORTER_PORT:-9187}:9187"
    restart: unless-stopped

volumes:
  ivy-cache:
    name: spark-dev-ivy-cache
  grafana-data:
    name: spark-dev-grafana-data
