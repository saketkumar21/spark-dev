# =============================================================================
# Spark Defaults Configuration
# Used by Spark Connect Server (Docker) and local Spark (fallback)
# =============================================================================

# ── SQL Extensions ───────────────────────────────────────────────────────────
# JARs (Iceberg, Delta, Kafka) are pre-installed in $SPARK_HOME/jars/ via
# Dockerfile multi-stage build — no spark.jars.packages needed.
spark.sql.extensions                    org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions,\
                                        io.delta.sql.DeltaSparkSessionExtension

# ── Catalogs ─────────────────────────────────────────────────────────────────
# Iceberg (default catalog)
spark.sql.catalog.iceberg_catalog                   org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.iceberg_catalog.type              hadoop
spark.sql.catalog.iceberg_catalog.warehouse         ./.tmp/local_iceberg_warehouse

# Delta Lake (takes over spark_catalog)
spark.sql.catalog.spark_catalog                     org.apache.spark.sql.delta.catalog.DeltaCatalog
spark.sql.catalog.spark_catalog.warehouse           ./.tmp/local_delta_warehouse

# Default to spark_catalog (Hive/Delta) for Thrift Server compatibility.
# Notebooks use iceberg_catalog explicitly where needed.
spark.sql.defaultCatalog                            spark_catalog

# ── Warehouse & Metastore ───────────────────────────────────────────────────
spark.sql.warehouse.dir                ./.tmp/spark-warehouse
spark.driver.extraJavaOptions          -Dderby.system.home=./.tmp/metastore

# ── Memory & Resources ──────────────────────────────────────────────────────
spark.driver.memory                     4g
spark.driver.maxResultSize              2g
spark.sql.shuffle.partitions            20

# ── Network ──────────────────────────────────────────────────────────────────
spark.driver.bindAddress                0.0.0.0
spark.driver.host                       0.0.0.0

# ── Spark Connect (embedded via plugin in Thrift Server) ────────────────────
spark.plugins                           org.apache.spark.sql.connect.SparkConnectPlugin
spark.connect.grpc.binding.port         15002

# ── Spark Thrift Server (HiveServer2) ───────────────────────────────────────
spark.hive.server2.thrift.port          10000
spark.hive.server2.thrift.bind.host     0.0.0.0

# ── Spark UI ─────────────────────────────────────────────────────────────────
spark.ui.port                           4040

# ── Developer Experience ─────────────────────────────────────────────────────
spark.sql.session.timeZone              UTC
spark.ui.showConsoleProgress            true
spark.sql.repl.eagerEval.enabled        true

# ── Event Log (for History Server) ──────────────────────────────────────────
spark.eventLog.enabled                  true
spark.eventLog.dir                      ./.tmp/spark-events
spark.history.fs.logDirectory           ./.tmp/spark-events

# ── Optimizations ────────────────────────────────────────────────────────────
spark.sql.adaptive.enabled              true
