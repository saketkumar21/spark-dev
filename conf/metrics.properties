# Spark metrics → Prometheus (CAP-3 observability, optional).
# The PrometheusServlet sink serves metrics in Prometheus text format on the EXISTING Spark UI
# port (4040), so no extra port/agent is needed. Endpoints (verified, Spark docs):
#   driver    → /metrics/prometheus/
#   executors → /metrics/executors/prometheus/
# Activated only when spark.ui.prometheus.enabled=true and spark.metrics.conf points here
# (see conf/spark-defaults.conf). Harmless when the monitoring profile isn't running — it just
# exposes an endpoint nothing scrapes.
*.sink.prometheusServlet.class=org.apache.spark.metrics.sink.PrometheusServlet
*.sink.prometheusServlet.path=/metrics/prometheus

# Instrument the JVM (heap, GC) on the driver/executors — the SPK-* memory/GC signals.
*.source.jvm.class=org.apache.spark.metrics.source.JvmSource
